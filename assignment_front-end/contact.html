<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>
</head>
<body style="text-align:center; background:#30b8cd; font-family:serif;">

<h1>Contact Us</h1>

<form>
<label>Full Name:</label><br>
<input type="text" placeholder="Enter your name"><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter your email"><br><br>

<label>Subject:</label><br>
<input type="text" placeholder="Enter subject"><br><br>

<label>Message:</label><br>
<textarea rows="6" cols="30" placeholder="Enter your message"></textarea><br><br>

<button type="submit">Submit</button>
</form>
</body>
<hr>
<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<body style="background:#ef9f0b; font-family:serif;">

<h1>Login Form</h1>

<form>

<label>Email:</label><br>
<input type="email" placeholder="Enter email"><br><br>

<label>Password:</label><br>
<input type="password" placeholder="Enter password"><br><br>

<button type="submit">Login</button>

</form>
<hr>
<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
</head>
<body style="text-align:center; background:#07ec31; font-family:serif;">

<h1>Forgot Password</h1>

<form>

<label>Enter your email:</label><br>
<input type="email" placeholder="Enter registered email"><br><br>

<label>Enter your phone:</label><br>
<input type="text" placeholder="Enter registered phone"><br><br>

<label>Enter your password:</label><br>
<input type="password" placeholder="Enter password"><br><br>

<label>Enter your confirm password:</label><br>
<input type="password" placeholder="Enter confirm password"><br><br>

<button type="submit">Reset Password</button>

</form>
<hr>
<!DOCTYPE html>
<html>
<head>
<title>Registration</title>
</head>
<body style="text-align:center; background:#f006e0; font-family:serif;">

<h1>Registration Form</h1>

<form>

<label>Full Name:</label><br>
<input type="text" placeholder="Enter full name"><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter email"><br><br>

<label>Password:</label><br>
<input type="password" placeholder="Enter password"><br><br>

<label>Confirm Password:</label><br>
<input type="password" placeholder="Confirm password"><br><br>

<button type="submit">Register</button>

</form>

</body>
</html>
