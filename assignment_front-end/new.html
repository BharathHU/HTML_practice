<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Table With RowSpan And ColSpan</h2>
    <table border="1">
        <th>Name</th>
        <th>Department</th>
        <th>Year</th>
        <tr>
            <th rowspan="2"> John Doe</th>
            <td>Computer Science</td>
            <td>2nd Year</td>
        </tr>
        <tr>
            <td>Mathematics</td>
            <td>3rd Year</td>
        </tr>
        <tr>
            <th rowspan="2">Jane Smith</th>
            <td>Physics</td>
            <td>1st Year</td>
        </tr>
        <tr>
            <td>Biology</td>
            <td>2nd year</td>
        </tr>
    </table>
</body>
</html>
